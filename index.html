<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Meditation Website </title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="video">
    <video autoplay muted loop id="bg-video">
      <source src="birthday.mp4" type="video/mp4">
    </video>
  </div>
  <div class="app">
    <div id="birthday-heading" class="birthday-heading">
      <h1>Happy Birthday!</h1>
    </div>

    <div id="birthday-text" class="birthday-text">
      <h2> 
        Happy Birthday to the Best Person in the World!
      </h2>
    </div>


    <div class="audio">
      <audio id="player" autoplay loop>
        <source src="birthday.mp3" type="audio/mpeg">
      </audio>

      <img src="pause-button.png" alt="pause" onclick="pause()">

      <img src="volume-down.png" alt="Down" onclick="down()">

      <input type="range" min="1" max="100" value="100" id="VRange">

      <img src="volume-up.png" alt="Up" onclick="up()">

      <img src="play-button.png" alt="play" onclick="play()">
      <script>
        function down() {
          // Decrease the volume of the 'player' element by 0.1 (10%)
          document.getElementById('player').volume -= 0.1;
          // Update the value of the 'VRange' range input to reflect the updated volume
          document.getElementById('VRange').value = document.getElementById('player').volume * 100
        }
        function up() {
          // Increase the volume of the 'player' element by 0.1 (10%)
          document.getElementById('player').volume += 0.1;
          // Update the value of the 'VRange' range input to reflect the updated volume
          document.getElementById('VRange').value = document.getElementById('player').volume * 100
        }
        function play() {
          // Play the media player element with the ID 'player'
          document.getElementById('player').play();
        }
        function pause() {// pause the media player element with the ID 'player'
          document.getElementById('player').pause()
        }
      </script>
    </div>

    <div class="video-button">
      <img src="cake.png" alt="Cake" onclick="videoUrl('birthday.mp4','birthday.mp3')">
      <script>
        function videoUrl(src_video, src_audio) {
          // Update the source URL of the video element with ID 'bg-video'
          document.getElementById('bg-video').src = src_video;
          // Update the source URL of the audio element with ID 'player'
          document.getElementById('player').src = src_audio;//set audio url
        };
      </script>
    </div>
  </div>

</body>

</html>
